<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annif RVK Keyword Suggestion</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</head>
<body>
    <div class="container">
        <h1 class="mt-5">Get Keyword Suggestions</h1>
        <form id="keywordForm">
            <div class="form-group">
                <label for="bookTitle">Enter Book Title:</label>
                <input type="text" class="form-control" id="bookTitle" required>
            </div>
            <button type="submit" class="btn btn-primary">Get Suggestions</button>
        </form>
        <div class="mt-4" id="suggestions"></div>
    </div>
    <script>
        $(document).ready(function() {
            $('#keywordForm').on('submit', function(event) {
                event.preventDefault();
                var title = $('#bookTitle').val();
                $.ajax({
                    url: 'https://api.annif.org/suggest',
                    type: 'GET',
                    data: { title: title },
                    success: function(data) {
                        var suggestions = data.suggestions.map(function(s) {
                            return '<li>' + s + '</li>';
                        }).join('');
                        $('#suggestions').html('<h2>Suggestions:</h2><ul>' + suggestions + '</ul>');
                    },
                    error: function() {
                        $('#suggestions').html('<h2>Error retrieving suggestions.</h2>');
                    }
                });
            });
        });
    </script>
</body>
</html>
